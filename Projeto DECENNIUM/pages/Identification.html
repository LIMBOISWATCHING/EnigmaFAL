<div class="identification-page">

    <!-- Marca d'água -->

    <img
        class="identification-background"
        src="assets/images/logo.png"
        alt="The Magnus Institute">

    <!-- Login -->

    <section class="identification-panel">

        <h1>THE MAGNUS INSTITUTE</h1>

        <p>

            Digite seu nome para acessar seus registros.

        </p>

        <form id="identification-form">

            <input

                id="username"

                type="text"

                maxlength="30"

                autocomplete="off"

                spellcheck="false"

                placeholder="Nome"

                required>

            <button
                id="access-button"
                type="submit">

                ACESSAR

            </button>

        </form>

    </section>

</div>
